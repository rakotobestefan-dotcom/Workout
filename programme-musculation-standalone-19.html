<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12141a">
<title>Carnet d'entraînement</title>
<style>
  :root{
    --bg:#12141a;
    --surface:#1b1e27;
    --surface2:#242836;
    --line:#30354512;
    --line2:#3a3f50;
    --accent:#ff5c39;
    --accent-dim:#ff5c3922;
    --accent2:#2fd9c4;
    --accent2-dim:#2fd9c422;
    --text:#f4f2ec;
    --muted:#8d92a3;
    --ring-bg:#2a2e3a;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    height:100%;}
  #app{min-height:100vh; display:flex; flex-direction:column; max-width:560px; margin:0 auto; position:relative;}
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:18px 18px 10px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#1a1a1a;flex-shrink:0;}
  .brand-title{font-weight:800; letter-spacing:-0.02em; font-size:15px; text-transform:uppercase;}
  .icon-btn{background:var(--surface); border:1px solid var(--line2); color:var(--text); width:38px;height:38px;
    border-radius:11px; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .icon-btn svg{width:18px;height:18px;stroke:var(--text); fill:none; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round;}
  main{flex:1; padding:6px 18px 110px; overflow-y:auto;}
  h1.page-title{font-size:22px; font-weight:800; letter-spacing:-0.02em; margin:14px 0 4px;}
  p.page-sub{color:var(--muted); font-size:13.5px; margin:0 0 18px; line-height:1.4;}
  .section-label{font-size:11.5px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin:22px 0 10px;}
  .diag-box{background:var(--surface2); border:1.5px dashed var(--line2); border-radius:12px; padding:10px 12px; font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.6;}
  .diag-btn{display:block; margin-top:8px; background:var(--accent2); color:#0d2421; border:none; border-radius:9px; padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer;}
  .block-card{background:var(--surface); border:1.5px solid var(--line2); border-radius:var(--radius);
    padding:14px 14px; display:flex; align-items:center; gap:13px; margin-bottom:10px; cursor:pointer; transition:border-color .15s, background .15s;}
  .block-card.selected{border-color:var(--accent); background:linear-gradient(135deg, var(--accent-dim), var(--surface));}
  .block-card .order-badge{width:26px;height:26px;border-radius:50%;background:var(--accent); color:#1a1a1a; font-weight:800; font-size:13px;
    display:flex;align-items:center;justify-content:center; flex-shrink:0;}
  .block-card .check{width:22px;height:22px;border-radius:50%; border:2px solid var(--line2); flex-shrink:0;}
  .block-card.selected .check{display:none;}
  .block-icon{width:42px;height:42px;border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .block-icon svg{width:26px;height:26px; stroke:var(--accent2); fill:none; stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round;}
  .block-info{flex:1; min-width:0;}
  .block-info .name{font-weight:700; font-size:15.5px;}
  .block-info .meta{color:var(--muted); font-size:12.5px; margin-top:1px;}
  .bracket-select{margin-top:8px; background:var(--surface2); color:var(--accent2); border:1.5px solid var(--line2);
    border-radius:9px; font-size:12.5px; font-weight:700; padding:6px 8px; width:100%; max-width:230px;}
  .lsit-row{margin-top:8px; display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--muted);}
  .lsit-row input{width:54px; background:var(--surface2); border:1.5px solid var(--line2); border-radius:9px;
    color:var(--accent2); font-weight:700; padding:6px 8px; text-align:center; font-variant-numeric:tabular-nums;}
  .cta-bar{position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; padding:14px 18px 22px;
    background:linear-gradient(to top, var(--bg) 70%, transparent); display:flex; gap:10px;}
  .btn{border:none; border-radius:14px; font-weight:800; font-size:14.5px; padding:15px 18px; cursor:pointer;
    text-transform:uppercase; letter-spacing:0.02em; flex:1; text-align:center;}
  .btn-primary{background:var(--accent); color:#19130f;}
  .btn-primary:disabled{background:var(--surface2); color:var(--muted); cursor:not-allowed;}
  .btn-ghost{background:var(--surface); color:var(--text); border:1.5px solid var(--line2);}
  .btn-secondary{background:var(--accent2); color:#0d2421;}
  /* Player */
  .player-wrap{display:flex; flex-direction:column; align-items:center; padding-top:8px;}
  .player-tag{font-size:11px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent2); margin-bottom:6px;}
  .player-sub{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .player-name{font-size:24px; font-weight:800; text-align:center; letter-spacing:-0.01em; margin-bottom:4px; max-width:380px;}
  .player-target{color:var(--muted); font-size:14px; margin-bottom:22px; text-align:center;}
  .ring-wrap{position:relative; width:230px; height:230px; margin-bottom:22px;}
  .ring-wrap svg{width:230px;height:230px; transform:rotate(-90deg);}
  .ring-bg{fill:none; stroke:var(--ring-bg); stroke-width:10;}
  .ring-fg{fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 0.25s linear;}
  .ring-fg.rest{stroke:var(--accent2);}
  .ring-center{position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring-icon svg{width:56px;height:56px; stroke:var(--text); fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; margin-bottom:6px;}
  .ring-time{font-size:42px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-0.02em;}
  .ring-time.rest{color:var(--accent2);}
  .player-controls{display:flex; gap:10px; width:100%; max-width:340px; margin-top:6px;}
  .manual-card{background:var(--surface); border:1.5px solid var(--line2); border-radius:20px; padding:24px 20px; width:100%; max-width:380px; text-align:center;}
  .manual-icon svg{width:70px;height:70px; stroke:var(--accent); fill:none; stroke-width:2.8; stroke-linecap:round; stroke-linejoin:round; margin-bottom:10px;}
  .input-row{display:flex; align-items:center; justify-content:center; gap:10px; margin:18px 0 6px;}
  .input-row input{width:90px; text-align:center; font-size:24px; font-weight:800; background:var(--surface2); border:1.5px solid var(--line2);
    border-radius:12px; color:var(--text); padding:10px; font-variant-numeric:tabular-nums;}
  .input-row .unit{color:var(--muted); font-size:13px;}
  .last-time{color:var(--accent2); font-size:13px; margin-top:6px; background:var(--surface2); border-radius:9px; padding:6px 10px; display:inline-block;}
  .multi-input-list{width:100%; margin-top:14px;}
  .multi-input-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .multi-input-label{font-size:13.5px; font-weight:600; text-align:left; flex:1;}
  .multi-input-label i{color:var(--accent2); font-style:normal; font-weight:500; font-size:11.5px;}
  .multi-input{width:70px; text-align:center; font-size:18px; font-weight:800; background:var(--surface2); border:1.5px solid var(--line2);
    border-radius:10px; color:var(--text); padding:8px; font-variant-numeric:tabular-nums; flex-shrink:0;}
  .progress-dots{display:flex; gap:5px; margin-top:18px;}
  .progress-dots span{width:6px;height:6px;border-radius:50%; background:var(--line2);}
  .progress-dots span.done{background:var(--accent);}
  .progress-dots span.current{background:var(--accent2);}
  /* history */
  .hist-item{background:var(--surface); border:1.5px solid var(--line2); border-radius:14px; padding:13px 14px; margin-bottom:9px;}
  .hist-item.hist-selected{border-color:var(--accent);}
  .hist-item-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .hist-del{background:none; border:none; padding:4px; cursor:pointer; flex-shrink:0;}
  .hist-del svg{width:17px;height:17px; stroke:var(--muted); fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;}
  .hist-check{width:22px;height:22px;border-radius:50%; border:2px solid var(--line2); flex-shrink:0;}
  .hist-check.checked{background:var(--accent); border-color:var(--accent);}
  .hist-date{font-weight:800; font-size:14px;}
  .hist-blocks{color:var(--accent2); font-size:12.5px; margin-top:2px;}
  .hist-detail{color:var(--muted); font-size:12px; margin-top:6px; line-height:1.6;}
  .hist-detail-line{margin-top:2px;}
  .hist-block-name{color:var(--accent2); font-weight:700;}
  .empty{color:var(--muted); text-align:center; padding:50px 20px; font-size:14px; line-height:1.6;}
  .summary-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line2); font-size:13.5px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-ex{font-weight:600;}
  .summary-val{color:var(--accent2); font-weight:700;}
  .day-pill{display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:700; color:var(--accent2);}
  .skip-row{text-align:center; margin-top:14px;}
  .skip-row button{background:none;border:none;color:var(--muted); font-size:12.5px; text-decoration:underline; cursor:pointer;}
</style>
</head>
<body>
<div id="app"></div>

  async get(key){
    const v = localStorage.getItem('musculation_'+key);
    if(v===null) return null;
    return {key, value:v};
  },
  async set(key, value){
    localStorage.setItem('musculation_'+key, value);

/* ============ STORAGE ============ */
async function loadState(){
  try{
    const r = await window.storage.get('tractions-progress', false);
    if(r){ const d = JSON.parse(r.value); S.tractionsBracket = d.bracket || '6-8'; S.tractionsDays = d.days || {}; }
    else {
      // migration depuis l'ancienne version (un seul palier 6-8)
      try{ const old = await window.storage.get('tractions-day', false); if(old){ S.tractionsDays['6-8'] = JSON.parse(old.value).day || 1; await saveTractionsProgress(); } }catch(e2){}
    }
  }catch(e){}
  try{ const r = await window.storage.get('history', false); if(r) S.history = JSON.parse(r.value); }catch(e){}
  try{ const r = await window.storage.get('lsit-duration', false); if(r) S.lsitDuration = parseInt(r.value,10) || LSIT_DEFAULT_DURATION; }catch(e){}
}
function currentTractionsDay(){ return S.tractionsDays[S.tractionsBracket] || 1; }
async function saveTractionsProgress(){
  try{ await window.storage.set('tractions-progress', JSON.stringify({bracket:S.tractionsBracket, days:S.tractionsDays}), false); }catch(e){}
}
async function setTractionsBracket(key){
  S.tractionsBracket = key;
  if(!S.tractionsDays[key]) S.tractionsDays[key] = 1;
  await saveTractionsProgress();
}
async function setTractionsDay(dayNum){
  S.tractionsDays[S.tractionsBracket] = dayNum;
  await saveTractionsProgress();
}
async function advanceTractionsDay(){
  const totalDays = TRACTIONS_BRACKETS[S.tractionsBracket].days.length;
  const d = currentTractionsDay();
  S.tractionsDays[S.tractionsBracket] = d>=totalDays ? 1 : d+1;
  await saveTractionsProgress();
}
async function saveHistory(){
  try{ await window.storage.set('history', JSON.stringify(S.history.slice(-60)), false); }catch(e){}
}
async function deleteHistoryDates(dates){
  S.history = S.history.filter(h=>!dates.includes(h.date));
  await saveHistory();
}
async function setLsitDuration(seconds){
  S.lsitDuration = Math.max(1, seconds);
  try{ await window.storage.set('lsit-duration', String(S.lsitDuration), false); }catch(e){}
}

function step(o){ return Object.assign({blockName:'', kind:'timer', duration:null, label:'', sub:'', icon:null, unit:'none', target:'', note:'', logId:null}, o); }

function buildTractions(){
  const bracket = TRACTIONS_BRACKETS[S.tractionsBracket];
  const day = currentTractionsDay();
  const d = bracket.days[day-1];
  const all = [...d.s, d.max!=null ? `max(min ${d.max})` : d.fixed5];
  const steps = [];
  const eccNote = bracket.eccentric ? ' — excentrique : descente lente ~3s' : '';
  all.forEach((val, i)=>{
    const isMaxSet = (d.max!=null) && i===all.length-1;
    steps.push(step({
      blockName:'Tractions', kind:'manual', icon:'pullup', unit:'reps',
      label: bracket.eccentric ? 'Traction excentrique' : 'Traction', sub:`Série ${i+1}/5${eccNote}`,
      target: isMaxSet ? `Max — minimum ${d.max}` : `${val} reps`,
      logId:`tractions_s${i+1}`
    }));
    if(i < all.length-1){
      steps.push(step({blockName:'Tractions', kind:'timer', duration:120, label:'Repos', sub:`Avant série ${i+2}/5`, icon:'rest', unit:'none'}));
    }
  });
  return {name:`Tractions (${bracket.label} — Jour ${day}/${bracket.days.length})`, steps};
}

function buildJambes(){
  const steps = [];
  JAMBES_BLOCS.forEach((bloc, bi)=>{
    for(let tour=1; tour<=JAMBES_TOURS; tour++){
      bloc.exos.forEach((ex, ei)=>{
        steps.push(step({
          blockName:'Jambes', kind:'manual', icon:ex.icon, unit:ex.unit,
          label:ex.name, sub:`${bloc.name} · Tour ${tour}/3`, target:ex.target,
          logId:`jambes_b${bi}_t${tour}_e${ei}`
        }));
      });
      steps.push(step({blockName:'Jambes', kind:'timer', duration:120, label:'Repos', sub:`Fin de tour ${tour}/3 — ${bloc.name}`, icon:'rest', unit:'none'}));
    }
  });
  return {name:'Jambes', steps};
}

function buildPecs(){
  const steps = [];
  const total = PECS_EXOS.length;
  PECS_EXOS.forEach((ex, i)=>{
    steps.push(step({
      blockName:'Pecs', kind:'timer', duration:ex.duration || PECS_WORK, icon:ex.icon, unit:ex.unit,
      label:ex.name, sub:`Mouvement ${i+1}/${total}`, target:ex.target, isWork:true,
      logId: ex.unit!=='none' ? `pecs_${i}` : null,
      manualStart: !!ex.manualStart, earlyStopLog: !!ex.earlyStopLog, autoLogOnComplete: !!ex.autoLogOnComplete, midBeep: !!ex.midBeep,
      multiInputs: ex.multiInputs || null
    }));
    if(i < total-1){
      steps.push(step({blockName:'Pecs', kind:'timer', duration:PECS_REST, label:'Repos', sub:`Avant mouvement ${i+2}/${total}`, icon:'rest', unit:'none'}));
    }
  });
  return {name:'Pecs', steps};
}

function buildDips(){
  const steps = [];

  }
  return {name:'Dips', steps};
}

    }));
    if(i < TOESTOBAR_PROGRAM.series){
      steps.push(step({blockName:'Toes to bar genou plié', kind:'timer', duration:TOESTOBAR_PROGRAM.rest, label:'Repos', sub:`Avant série ${i+1}/${TOESTOBAR_PROGRAM.series}`, icon:'rest', unit:'none'}));
    }
  }
  return {name:'Toes to bar genou plié', steps};
}

function buildLsit(){
  const steps = [];
  for(let i=1; i<=LSIT_PROGRAM.series; i++){
    steps.push(step({
      blockName:'L-sit', kind:'timer', duration:S.lsitDuration, icon:'lsit', unit:'time',
      label:'L-sit', sub:`Hold ${i}/${LSIT_PROGRAM.series}`, target:`${S.lsitDuration}s de hold`,
      manualStart: i===1, earlyStopLog:true, autoLogOnComplete:true, logId:`lsit_s${i}`
    }));
    if(i < LSIT_PROGRAM.series){
      steps.push(step({blockName:'L-sit', kind:'timer', duration:LSIT_PROGRAM.rest, label:'Repos', sub:`Avant hold ${i+1}/${LSIT_PROGRAM.series}`, icon:'rest', unit:'none'}));
    }
  }
  return {name:'L-sit', steps};
}


function buildCardio(prog, name){
  const steps = [];
  prog.exos.forEach((ex, i)=>{
    steps.push(step({
      blockName:name, kind:'timer', duration:prog.work, icon:ex.icon, unit:'none',
      label:ex.name, sub:(ex.note? ex.note : `Mouvement ${i+1}/${prog.exos.length}`), target:`${prog.work}s`
    }));
    if(i < prog.exos.length-1){
      steps.push(step({blockName:name, kind:'timer', duration:prog.rest, label:'Repos', sub:`Avant mouvement ${i+2}/${prog.exos.length}`, icon:'rest', unit:'none'}));
    }
  });
  return {name, steps};
}

function buildCardio3(){
  const steps = [];
  for(let r=1; r<=CARDIO3.rounds; r++){
    CARDIO3.exos.forEach((ex, i)=>{
      steps.push(step({
        blockName:'Cardio Exo 3', kind:'timer', duration:CARDIO3.work, icon:ex.icon, unit:'none',
        label:ex.name, sub:`Round ${r}/3 · Mouvement ${i+1}/7`, target:`${CARDIO3.work}s`
      }));
      const lastEx = i === CARDIO3.exos.length-1;
      if(!lastEx){
        steps.push(step({blockName:'Cardio Exo 3', kind:'timer', duration:CARDIO3.rest, label:'Repos', sub:`Round ${r}/3`, icon:'rest', unit:'none'}));
      } else if(r < CARDIO3.rounds){
        steps.push(step({blockName:'Cardio Exo 3', kind:'timer', duration:CARDIO3.roundRest, label:'Repos entre rounds', sub:`Avant round ${r+1}/3`, icon:'rest', unit:'none'}));
      }
    });
  }
  return {name:'Cardio Exo 3', steps};
}

/* ============ RENDER: HISTORY ============ */
function groupHistoryByDate(history){
  const map = {}; const order = [];
  history.forEach(h=>{
    if(!map[h.date]){ map[h.date] = {date:h.date, blocks:[], details:[]}; order.push(h.date); }
    h.blocks.forEach(b=>{ if(!map[h.date].blocks.includes(b)) map[h.date].blocks.push(b); });
    map[h.date].details.push(...(h.details||[]));
  });
  return order.map(d=>map[d]);
}
function groupDetailsByBlock(details){
  const blockMap = {}; const blockOrder = [];
  (details||[]).forEach(d=>{
    if(d.value===''||d.value==null) return;
    if(!blockMap[d.block]){ blockMap[d.block] = {block:d.block, exMap:{}, exOrder:[]}; blockOrder.push(d.block); }
    const bm = blockMap[d.block];
    if(!bm.exMap[d.exercise]){ bm.exMap[d.exercise] = {exercise:d.exercise, unit:d.unit, values:[]}; bm.exOrder.push(d.exercise); }
    bm.exMap[d.exercise].values.push(d.value);
  });
  return blockOrder.map(b=>({block:b, exercises: blockMap[b].exOrder.map(e=>blockMap[b].exMap[e])}));
}
function renderHistory(){
  const grouped = groupHistoryByDate(S.history).reverse();
  const selecting = S.historySelectMode;
  const selected = S.historySelected || [];
  let body = grouped.length===0
    ? `<div class="empty">Aucune séance enregistrée pour l'instant.<br>Lance ta première séance depuis l'accueil.</div>`
    : grouped.map(h=>{
        const blockGroups = groupDetailsByBlock(h.details);
        const detailLines = blockGroups.map(bg=>{
          const exLine = bg.exercises.map(ex=>{
            const joined = ex.unit==='time' ? ex.values.map(v=>v+"'").join('-') : ex.values.join(' - ');
            return `${ex.exercise} <b>${joined}</b>`;
          }).join(' · ');
          return `<div class="hist-detail-line"><span class="hist-block-name">${bg.block}</span> : ${exLine}</div>`;
        }).join('');
        const isSel = selected.includes(h.date);
        return `<div class="hist-item ${isSel?'hist-selected':''}" data-date="${h.date}">
          <div class="hist-item-top">
            <div>
              <div class="hist-date">${h.date}</div>
              <div class="hist-blocks">${h.blocks.join(' · ')}</div>
            </div>
            ${selecting
              ? `<div class="hist-check ${isSel?'checked':''}" data-action="toggle"></div>`
              : `<button class="hist-del" data-action="delete-one">${svg('trash')}</button>`}
          </div>
          ${detailLines ? `<div class="hist-detail">${detailLines}</div>` : ''}
        </div>`;
      }).join('');
  return `
    <div class="topbar">
      <div class="icon-btn" id="btn-back-home">${svg('history')}</div>
      <div class="brand-title">Historique</div>
      ${grouped.length>0 ? `<button class="icon-btn" id="btn-toggle-select" style="width:auto; padding:0 12px; font-size:12px; font-weight:700;">${selecting?'Annuler':'Sélectionner'}</button>` : `<div style="width:38px"></div>`}
    </div>
    <main>${body}</main>
    ${selecting && selected.length>0 ? `
      <div class="cta-bar">
        <button class="btn btn-primary" id="btn-delete-selected" style="background:var(--accent);">Supprimer (${selected.length})</button>
      </div>` : ''}
  `;
}

/* ============ PLAYER ============ */
function primeAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }catch(e){}
  try{
    if('speechSynthesis' in window){
      loadVoices();
      if(!cachedVoices.length){
        window.speechSynthesis.onvoiceschanged = loadVoices;
      }
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 1;
      window.speechSynthesis.speak(u);
    }
  }catch(e){}
}

function startSession(){
  primeAudio();
  const defs = blockDefs();
  let steps = [];
  let names = [];
  S.selected.forEach(key=>{
    const def = defs.find(d=>d.key===key);
    const built = def.build();
    steps = steps.concat(built.steps);
    names.push(built.name);
    if(built.onComplete) steps[steps.length-1]._onCompleteAfter = built.onComplete; // tagged on last step of that block - handled separately
  });
  S.queue = steps;
  S.blockNames = names;
  S.idx = 0;
  S.sessionLog = [];
  S.phase = 'idle';
  S.screen = 'player';
  render();
  beginQueue();
}

function startPrecountdown(onDone){
  S.phase = 'precountdown';
  S.remaining = 7;
  render();
  clearTimerHandle();
  S.timerHandle = setInterval(()=>{
    S.remaining--;
    if(S.remaining > 0){
      beep(false);
      render();
    } else {
      beep(true);
      clearTimerHandle();
      onDone();
    }
  }, 1000);
}

function beginQueue(){
  const first = S.queue[0];
  if(first && first.kind === 'timer' && !first.manualStart){
    startPrecountdown(()=>goToStep(0));
  } else {
    goToStep(0);
  }
}

function currentStep(){ return S.queue[S.idx]; }

let cachedVoices = [];
function loadVoices(){
  try{
    cachedVoices = window.speechSynthesis.getVoices() || [];
  }catch(e){}
}
function pickVoice(){
  if(!cachedVoices.length) loadVoices();
  let v = cachedVoices.find(v=>v.lang && v.lang.toLowerCase().startsWith('fr'));
  return v || cachedVoices[0] || null;
}

let lastSpeechStatus = 'jamais testé';
let speechRetried = false;
function speak(text){
  try{
    if(!('speechSynthesis' in window)){ lastSpeechStatus = 'API absente'; return; }
    window.speechSynthesis.cancel();
    speechRetried = false;
    setTimeout(()=>{ trySpeak(text); }, 80);
  }catch(e){}
}
function trySpeak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice();
    if(!speechRetried){
      if(v) u.voice = v;
      u.lang = (v && v.lang) ? v.lang : 'fr-FR';
    }
    // sur le 2e essai (après échec), on ne force ni voix ni langue : voix par défaut du système
    u.rate = 1;
    u.volume = 1;
    lastSpeechStatus = speechRetried ? 'nouvel essai (voix système par défaut)' : `appelé (voix: ${v ? v.name+' / '+v.lang : 'aucune'})`;
    u.onstart = ()=>{ lastSpeechStatus = (speechRetried?'[2e essai] ':'')+'lecture démarrée (onstart)'; render(); };
    u.onerror = (e)=>{
      lastSpeechStatus = (speechRetried?'[2e essai] ':'')+'ERREUR: '+(e.error||'inconnue');
      if(!speechRetried){
        speechRetried = true;
        render();
        setTimeout(()=>trySpeak(text), 120);
        return;
      }
      render();
    };
    u.onend = ()=>{ lastSpeechStatus += ' → terminé'; render(); };
    window.speechSynthesis.speak(u);
    render();
  }catch(e){ lastSpeechStatus = 'exception JS: '+e.message; render(); }
}

function goToStep(i){
  clearTimerHandle();
  if(i >= S.queue.length){ finishSession(); return; }
  S.idx = i;
  const st = currentStep();
  if(!isRestStep(st) && S.announcedStepIdx !== i) speak('Prochain exercice : ' + st.label);
  S.announcedStepIdx = -1;
  if(st.kind === 'timer'){
    S.remaining = st.duration;
    if(st.manualStart){
      S.phase = 'ready';
      render();
    } else {
      S.phase = 'running';
      render();
      runTimerTick();
    }
  } else {
    S.phase = 'manual';
    render();
  }
}

function startManualTimer(){
  const st = currentStep();
  startPrecountdown(()=>{
    S.remaining = st.duration;
    S.phase = 'running';
    render();
    runTimerTick();
  });
}

function clearTimerHandle(){ if(S.timerHandle){ clearInterval(S.timerHandle); S.timerHandle=null; } }

function isRestStep(st){ return st && (st.label === 'Repos' || st.label === 'Repos entre rounds'); }

let audioCtx = null;
function beep(strong){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = strong ? 1046 : 784;
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.95, now+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+(strong?0.32:0.16));
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now+(strong?0.34:0.18));
    if(strong){
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'square';
      osc2.frequency.value = 1046;
      gain2.gain.setValueAtTime(0.0001, now+0.18);
      gain2.gain.exponentialRampToValueAtTime(0.95, now+0.19);
      gain2.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(now+0.18); osc2.stop(now+0.42);
    }
  }catch(e){}
}

function runTimerTick(){
  clearTimerHandle();
  S.timerHandle = setInterval(()=>{
    S.remaining--;
    const st = currentStep();
    if(isRestStep(st) && S.remaining === 8){
      const next = S.queue[S.idx+1];
      if(next && !isRestStep(next) && S.announcedStepIdx !== S.idx+1){
        speak('Prochain exercice : ' + next.label);
        S.announcedStepIdx = S.idx+1;
      }
    }
    if(st && st.midBeep && st.duration && S.remaining === Math.round(st.duration/2)){ beep(true); }
    if(S.remaining > 0 && S.remaining <= 7){ beep(false); }
    if(S.remaining <= 0){
      beep(true);
      clearTimerHandle();
      onTimerEnd();
    } else {
      updateRingDisplay();
    }
  }, 1000);
}

function onTimerEnd(){
  const st = currentStep();
  const isRest = isRestStep(st);
  if(isRest){
    advanceStep();
  } else if(st.autoLogOnComplete){
    if(st.logId) S.sessionLog.push({block:st.blockName, exercise:st.label, sub:st.sub, value:st.duration, unit:st.unit});
    advanceStep();
  } else if(st.unit !== 'none'){
    S.phase = 'confirm';
    render();
  } else {
    advanceStep();
  }
}

function stopEarly(){
  const st = currentStep();
  clearTimerHandle();
  const held = Math.max(0, st.duration - S.remaining);
  if(st.logId) S.sessionLog.push({block:st.blockName, exercise:st.label, sub:st.sub, value:held, unit:st.unit});
  advanceStep();
}

function advanceStep(){
  goToStep(S.idx+1);
}

function logValue(value){
  const st = currentStep();
  if(st.logId){
    S.sessionLog.push({block:st.blockName, exercise:st.label, sub:st.sub, value, unit:st.unit});
  }
  advanceStep();
}

function logMultiValues(entries){
  const st = currentStep();
  entries.forEach(e=>{
    if(e.value==='' || e.value==null) return;
    S.sessionLog.push({block:st.blockName, exercise:`${st.label} — ${e.label}`, sub:st.sub, value:e.value, unit:st.unit});
  });
  advanceStep();
}

function skipStep(){
  const st = currentStep();
  if(st.kind==='timer' && st.unit!=='none' && (st.label!=='Repos') && !st.autoLogOnComplete){
    S.phase='confirm'; clearTimerHandle(); render(); return;
  }
  advanceStep();
}

function pauseResume(){
  if(S.phase==='running'){ clearTimerHandle(); S.phase='paused'; render(); }
  else if(S.phase==='paused'){ S.phase='running'; render(); runTimerTick(); }
}

async function finishSession(){
  clearTimerHandle();
  // run any onComplete callbacks (e.g. tractions day increment) once
  blockDefs().forEach(d=>{ if(S.selected.includes(d.key) && d.key==='tractions'){ /* handled below */ } });
  if(S.selected.includes('tractions')){
    await advanceTractionsDay();
  }
  const entry = {
    date: new Date().toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'short', year:'numeric'}),
    blocks: S.blockNames,
    details: S.sessionLog.map(l=>({block:l.block, exercise:l.exercise, sub:l.sub, value:l.value, unit:l.unit}))
  };
  S.history.push(entry);
  await saveHistory();
  S.phase = 'done';
  render();
}

function getLastValue(block, exercise, sub){
  for(let i=S.history.length-1; i>=0; i--){
    const h = S.history[i];
    const match = (h.details||[]).find(d=>d.block===block && d.exercise===exercise && d.sub===sub && d.value!=='' && d.value!=null);
    if(match) return match;
  }
  return null;
}

function ringDash(){ const R=105; return 2*Math.PI*R; }

function updateRingDisplay(){
  const timeEl = document.getElementById('ring-time-val');
  const ringFg = document.getElementById('ring-fg');
  const st = currentStep();
  if(timeEl) timeEl.textContent = S.remaining;
  if(ringFg){
    const total = st.duration || 1;
    const pct = S.remaining/total;
    const C = ringDash();
    ringFg.style.strokeDashoffset = (C*(1-pct)).toFixed(1);
  }
}

            <div class="player-name">${st.label}</div>
            <div class="player-target">Objectif : ${st.target}</div>
            ${last ? `<div class="last-time">Dernière fois : <b>${last.value}${last.unit==='time'?'s':' reps'}</b></div>` : ''}
            <div class="input-row">
              <input type="number" id="manual-input" inputmode="numeric" placeholder="${last?last.value:'0'}">
              <span class="unit">${st.unit==='time'?'sec':'reps'}</span>
            </div>
            <button class="btn btn-primary" id="btn-validate" style="width:100%; margin-top:10px;">Continuer</button>
          </div>
          <div class="progress-dots">${dots}</div>
        </div>
      </main>
    `;
  }

  if(S.phase === 'ready'){
    const last = getLastValue(st.blockName, st.label, st.sub);
    return `
      <div class="topbar"><div class="icon-btn" id="btn-quit">${svg('history')}</div><div class="brand-title">${st.blockName}</div><div style="width:38px"></div></div>
      <main>
        <div class="player-wrap">
          <div class="player-tag">${st.sub}</div>
          <div class="manual-card">
            <div class="manual-icon">${svg(st.icon || 'lsit')}</div>
            <div class="player-name">${st.label}</div>
            <div class="player-target">Objectif : ${st.target}</div>
            ${last ? `<div class="last-time">Dernière fois : <b>${last.value}${last.unit==='time'?'s':' reps'}</b></div>` : ''}
            <button class="btn btn-primary" id="btn-lancer" style="width:100%; margin-top:14px;">Lancer</button>
          </div>
          <div class="progress-dots">${dots}</div>
        </div>
      </main>
    `;
  }

  // running / paused timer
  const C = ringDash();
  return `
    <div class="topbar"><div class="icon-btn" id="btn-quit">${svg('history')}</div><div class="brand-title">${st.blockName}</div><div style="width:38px"></div></div>
    <main>
      <div class="player-wrap">
        <div class="player-tag">${isRest?'REPOS':'EN COURS'}</div>
        <div class="player-name">${st.label}</div>
        <div class="player-sub">${st.sub}</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 230 230">
            <circle class="ring-bg" cx="115" cy="115" r="105"></circle>
            <circle id="ring-fg" class="ring-fg ${isRest?'rest':''}" cx="115" cy="115" r="105"
              stroke-dasharray="${C}" stroke-dashoffset="${(C*(1-S.remaining/st.duration)).toFixed(1)}"></circle>
          </svg>
          <div class="ring-center">
            <div class="ring-icon">${svg(st.icon || 'rest')}</div>
            <div class="ring-time ${isRest?'rest':''}" id="ring-time-val">${S.remaining}</div>
          </div>
        </div>
        <div class="player-controls">
          <button class="btn btn-ghost" id="btn-pause">${S.phase==='paused'?'Reprendre':'Pause'}</button>
          ${st.earlyStopLog && !isRest ? `<button class="btn btn-secondary" id="btn-stop-early">J'ai lâché</button>` : `<button class="btn btn-secondary" id="btn-skip">Passer</button>`}
        </div>
        <div class="progress-dots">${dots}</div>
      </div>
    </main>
  `;
}

function renderDone(){
  const lines = S.sessionLog.map(l=>`<div class="summary-row"><span class="summary-ex">${l.exercise}</span><span class="summary-val">${l.value || '—'}${l.unit==='time'?'s':l.unit==='reps'?' reps':''}</span></div>`).join('');
  return `
    <div class="topbar"><div style="width:38px"></div><div class="brand-title">Séance terminée</div><div style="width:38px"></div></div>
    <main>
      <div class="player-wrap" style="padding-top:20px;">
        <div class="manual-icon">${svg('bolt')}</div>
        <h1 class="page-title">Bien joué 💪</h1>
        <p class="page-sub" style="text-align:center;">${S.blockNames.join(' · ')}</p>
        ${lines ? `<div class="manual-card" style="width:100%;">${lines}</div>` : ''}
      </div>
    </main>
    <div class="cta-bar">
      <button class="btn btn-primary" id="btn-home">Retour à l'accueil</button>
    </div>
  `;
}

/* ============ MASTER RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(S.screen==='home') app.innerHTML = renderHome();
  else if(S.screen==='history') app.innerHTML = renderHistory();
  else if(S.screen==='player'){
    app.innerHTML = (S.phase==='done') ? renderDone() : renderPlayer();
  }
  bindEvents();
}

function bindEvents(){
  const byId = id => document.getElementById(id);
  document.querySelectorAll('.block-card').forEach(card=>{
    card.onclick = (e)=>{
      if(e.target && (e.target.id === 'bracket-select' || e.target.id === 'day-select' || e.target.id === 'lsit-duration-input')) return;
      const key = card.dataset.key;
      const pos = S.selected.indexOf(key);
      if(pos>=0) S.selected.splice(pos,1);
      else S.selected.push(key);
      render();
    };
  });
  if(byId('bracket-select')) byId('bracket-select').onchange = async (e)=>{
    await setTractionsBracket(e.target.value);
    render();
  };
  if(byId('day-select')) byId('day-select').onchange = async (e)=>{
    await setTractionsDay(parseInt(e.target.value,10));
    render();
  };
  if(byId('lsit-duration-input')) byId('lsit-duration-input').onchange = async (e)=>{
    await setLsitDuration(parseInt(e.target.value,10) || LSIT_DEFAULT_DURATION);
    render();
  };
  if(byId('btn-clear')) byId('btn-clear').onclick = ()=>{ S.selected=[]; render(); };
  if(byId('btn-test-voice')) byId('btn-test-voice').onclick = (e)=>{
    e.target.textContent = 'Test envoyé ✓ (écoute…)';
    primeAudio();
    setTimeout(()=>speak('Squat'), 150);
    setTimeout(()=>{ if(byId('btn-test-voice')) byId('btn-test-voice').textContent = 'Tester la voix'; }, 2500);
  };
  if(byId('btn-start')) byId('btn-start').onclick = ()=>{ if(S.selected.length) startSession(); };
  if(byId('btn-history')) byId('btn-history').onclick = ()=>{ S.screen='history'; render(); };
  if(byId('btn-back-home')) byId('btn-back-home').onclick = ()=>{ S.historySelectMode=false; S.historySelected=[]; S.screen='home'; render(); };
  if(byId('btn-toggle-select')) byId('btn-toggle-select').onclick = ()=>{
    S.historySelectMode = !S.historySelectMode;
    S.historySelected = [];
    render();
  };
  if(byId('btn-delete-selected')) byId('btn-delete-selected').onclick = async ()=>{
    if(confirm(`Supprimer ${S.historySelected.length} jour(s) de l'historique ? Cette action est définitive.`)){
      await deleteHistoryDates(S.historySelected);
      S.historySelectMode = false;
      S.historySelected = [];
      render();
    }
  };
  document.querySelectorAll('.hist-item').forEach(card=>{
    const date = card.dataset.date;
    card.onclick = (e)=>{
      const action = e.target.closest('[data-action]');
      if(!action) return;
      if(action.dataset.action === 'toggle'){
        const i = S.historySelected.indexOf(date);
        if(i>=0) S.historySelected.splice(i,1); else S.historySelected.push(date);
        render();
      } else if(action.dataset.action === 'delete-one'){
        if(confirm(`Supprimer la séance du ${date} ?`)){
          deleteHistoryDates([date]).then(render);
        }
      }
    };
  });
  if(byId('btn-quit')) byId('btn-quit').onclick = ()=>{ clearTimerHandle(); S.screen='home'; render(); };
  if(byId('btn-home')) byId('btn-home').onclick = ()=>{ S.screen='home'; render(); };
  if(byId('btn-pause')) byId('btn-pause').onclick = pauseResume;
  if(byId('btn-skip')) byId('btn-skip').onclick = skipStep;
  if(byId('btn-lancer')) byId('btn-lancer').onclick = startManualTimer;
  if(byId('btn-stop-early')) byId('btn-stop-early').onclick = stopEarly;
  if(byId('btn-validate')) byId('btn-validate').onclick = ()=>{
    const inp = byId('manual-input');
    const val = inp ? inp.value : '';
    logValue(val);
  };
  if(byId('btn-validate-multi')) byId('btn-validate-multi').onclick = ()=>{
    const entries = Array.from(document.querySelectorAll('.multi-input')).map(inp=>({
      key: inp.dataset.key, label: inp.dataset.label, value: inp.value
    }));
    logMultiValues(entries);
  };
}

/* ============ INIT ============ */
(async function init(){
  await loadState();
  try{
    if('speechSynthesis' in window){
      loadVoices();
      window.speechSynthesis.onvoiceschanged = ()=>{ loadVoices(); render(); };
    }
  }catch(e){}
  render();
})();
</script>
</body>
</html>
